version: '3.8'
services:
    backend:
      build:
        context: ./backend
        dockerfile: Dockerfile
      container_name: leadflow-backend
      environment:
        # Use your existing Supabase SQL Connector connection string
        DATABASE_URL: ${DATABASE_URL}
        PORT: 5000
        NODE_ENV: development
        JWT_SECRET: ${JWT_SECRET}
        OTP_SECRET: ${OTP_SECRET}
        SUPABASE_URL: ${SUPABASE_URL}
        SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
        SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
        TIKTOK_CLIENT_KEY: ${TIKTOK_CLIENT_KEY}
        TIKTOK_MEDIA_UPLOAD_URL: ${TIKTOK_MEDIA_UPLOAD_URL}
        TIKTOK_CLIENT_SECRET: ${TIKTOK_CLIENT_SECRET}
        TIKTOK_REDIRECT_URI: http://localhost:5000/api/tiktok/callback
        TIKTOK_TOKEN_ENCRYPTION_KEY: ${TIKTOK_TOKEN_ENCRYPTION_KEY}
        FRONTEND_BASE_URL: http://localhost:5173
        ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ports:
        - "5000:5000"
      networks:
        - leadflow-network
      volumes:
        - ./backend/src:/app/src

    frontend:
      build:
        context: ./frontend
        dockerfile: Dockerfile
      container_name: leadflow-frontend
      environment:
        VITE_API_BASE_URL: http://localhost:5000/api
        VITE_DEBUG_AUTH: "false"
      ports:
        - "5173:5173"
      networks:
        - leadflow-network
      volumes:
        - ./frontend/src:/app/src

    ai-analyzer:
      build:
        context: ./ai-analyzer
        dockerfile: Dockerfile
      container_name: leadflow-ai
      environment:
        ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ports:
        - "8000:8000"
      networks:
        - leadflow-network

networks:
  leadflow-network:
    driver: bridge
