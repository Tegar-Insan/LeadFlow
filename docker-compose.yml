version: '3.8'
services:
    backend:
      build:
        context: ./backend
        dockerfile: Dockerfile
      container_name: leadflow-backend
      environment:
        # Use your existing Supabase SQL Connector connection string
        DATABASE_URL: ${DATABASE_URL}
        PORT: 5000
        NODE_ENV: development
        JWT_SECRET: ${JWT_SECRET}
        OTP_SECRET: ${OTP_SECRET}
        SUPABASE_URL: ${SUPABASE_URL}
        SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
        SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
        TIKTOK_CLIENT_KEY: ${TIKTOK_CLIENT_KEY}
        TIKTOK_MEDIA_UPLOAD_URL: ${TIKTOK_MEDIA_UPLOAD_URL}
        TIKTOK_CLIENT_SECRET: ${TIKTOK_CLIENT_SECRET}
        TIKTOK_REDIRECT_URI: http://localhost:5000/api/tiktok/callback
        TIKTOK_TOKEN_ENCRYPTION_KEY: ${TIKTOK_TOKEN_ENCRYPTION_KEY}
        FRONTEND_BASE_URL: http://localhost:5173
        ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
        AI_SERVICE_URL: http://ai-analyzer:8000
        SMTP_HOST: ${SMTP_HOST}
        SMTP_PORT: ${SMTP_PORT}
        SMTP_SECURE: ${SMTP_SECURE}
        SMTP_USER: ${SMTP_USER}
        SMTP_PASS: ${SMTP_PASS}
        EMAIL_FROM: ${EMAIL_FROM}
        TAVILY_API_KEY: ${TAVILY_API_KEY}
        IMAGE_GPT_API_KEY: ${IMAGE_GPT_API_KEY}
        OPENAI_IMAGE_MODEL: ${OPENAI_IMAGE_MODEL}
        
        
      ports:
        - "5000:5000"
      networks:
        - leadflow-network
      volumes:
        - ./backend:/app
        - /app/node_modules
        - /app/dist
      develop:
        watch:
          - action: sync
            path: ./backend
            target: /app
            ignore:
              - node_modules/
              - dist/
          - action: rebuild
            path: ./backend/package.json

    frontend:
      build:
        context: ./frontend
        dockerfile: Dockerfile
      container_name: leadflow-frontend
      environment:
        VITE_API_BASE_URL: http://localhost:5000/api
        VITE_DEBUG_AUTH: "false"
      ports:
        - "5173:5173"
      networks:
        - leadflow-network
      volumes:
        - ./frontend:/app
        - /app/node_modules
      develop:
        watch:
          - action: sync
            path: ./frontend
            target: /app
            ignore:
              - node_modules/
          - action: rebuild
            path: ./frontend/package.json

    ai-analyzer:
      build:
        context: ./ai-analyzer
        dockerfile: Dockerfile
      container_name: leadflow-ai
      environment:
        ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
        ANTHROPIC_MODEL: ${ANTHROPIC_MODEL}
        IMAGE_GPT_API_KEY: ${IMAGE_GPT_API_KEY}
        OPENAI_IMAGE_MODEL: ${OPENAI_IMAGE_MODEL}
        # Agentic Mode (PLAN.md) — Tavily MCP trend search + the agent's
        # direct Supabase tool (slot-collision check + draft insert)
        TAVILY_API_KEY: ${TAVILY_API_KEY}
        SUPABASE_URL: ${SUPABASE_URL}
        SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      ports:
        - "8000:8000"
      networks:
        - leadflow-network
      volumes:
        - ./ai-analyzer:/app
      develop:
        watch:
          - action: sync
            path: ./ai-analyzer
            target: /app
          - action: rebuild
            path: ./ai-analyzer/requirements.txt

networks:
  leadflow-network:
    driver: bridge
